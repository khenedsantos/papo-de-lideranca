services:
  postgres:
    image: postgres:16-alpine
    container_name: papo-backend-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: papo-backend-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/papo_de_lideranca?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${PORT:-3001}:${PORT:-3001}'
    command: sh -c "npm run db:prepare && npm run start:prod"

volumes:
  postgres_data:
